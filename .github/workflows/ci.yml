name: ci

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  plugin:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 18
          - os: ubuntu-latest
            node: 20
          - os: ubuntu-latest
            node: 22
          - os: windows-latest
            node: 20
          - os: macos-latest
            node: 20

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install plugin deps
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Typecheck plugin
        run: npm run typecheck

      - name: Test plugin
        run: npm test

      - name: Pack plugin tarball
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.node == 20 }}
        run: npm pack

      - name: Smoke test packed import
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.node == 20 }}
        shell: bash
        run: |
          set -e
          TGZ=$(ls *.tgz | head -n 1)
          TMP=$(mktemp -d)
          cp "$TGZ" "$TMP/pkg.tgz"
          cd "$TMP"
          npm init -y >/dev/null 2>&1
          npm install --silent "./pkg.tgz"
          node --input-type=module -e "
            import plugin from '@leo000001/opencode-notify-native'
            if (typeof plugin !== 'function') throw new Error('default export is not a function')
            const hooks = await plugin({ worktree: process.cwd(), directory: process.cwd() })
            if (!hooks || typeof hooks.event !== 'function') throw new Error('hooks.event missing')
            console.log('ok')
          " --no-warnings
