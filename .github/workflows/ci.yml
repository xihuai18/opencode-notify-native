name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install extension deps
        run: npm ci

      - name: Install plugin deps
        run: npm ci --prefix opencode-plugin

      - name: Build extension
        run: npm run build

      - name: Build plugin
        run: npm run build --prefix opencode-plugin

      - name: Test plugin
        run: npm test --prefix opencode-plugin

      - name: Package VSIX
        run: npm run package:vsix
