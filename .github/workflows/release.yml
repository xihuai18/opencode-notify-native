name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  plugin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install plugin deps
        run: npm ci --prefix opencode-plugin

      - name: Verify tag matches package version
        working-directory: opencode-plugin
        shell: bash
        run: |
          set -e
          VERSION=$(node -p "require('./package.json').version")
          if [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match opencode-plugin/package.json version v${VERSION}" >&2
            exit 1
          fi

      - name: Build plugin
        run: npm run build --prefix opencode-plugin

      - name: Typecheck plugin
        run: npm run typecheck --prefix opencode-plugin

      - name: Test plugin
        run: npm test --prefix opencode-plugin

      - name: Pack plugin tarball
        working-directory: opencode-plugin
        run: npm pack

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencode-notify-plugin-artifacts
          path: opencode-plugin/*.tgz

      - name: Check plugin version publish status
        id: plugin_version
        working-directory: opencode-plugin
        shell: bash
        run: |
          set -e
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish plugin to npm (optional)
        if: ${{ secrets.NPM_TOKEN != '' && steps.plugin_version.outputs.already_published != 'true' }}
        working-directory: opencode-plugin
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
